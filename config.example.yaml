# 河南农业大学晚归签到 —— 单租户配置
# 复制为 config.yaml 后填入真实值；config.yaml 已在 .gitignore

# 学校签到系统的 JWT（从手机微信抓包获取，Authorization: Bearer 后面那一串）
token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.xxxxx.yyyyy"

# 用于签到的考勤规则 ID；当前学校只有一条，ruleId=1
rule_id: 1

# 打卡坐标 —— 必须落在规则圆心半径内，否则后端拒绝
# 今晚 22:00 真实签到一次时用 reqable 抓 POST /checkin 的请求体，把以下字段对应粘过来
location:
  latitude:  34.000000
  longitude: 113.000000
  device_model:  "iPhone"
  device_system: "iOS"
  address: "河南省郑州市..."
  city:    "郑州市"
  road:    ""
  poi:     ""

# 调度策略：触发分钟（小时固定 22:00 窗口）
schedule:
  primary_minute_offset: 2   # 22:02 首次尝试
  primary_jitter_sec: 180    # +0~180 秒抖动
  retry_minute_offsets: [8, 15, 22]   # 失败后在 22:08 / 22:15 / 22:22 重试

# 日志
log:
  file: "wangui.log"
  level: "info"   # debug | info | warn | error
